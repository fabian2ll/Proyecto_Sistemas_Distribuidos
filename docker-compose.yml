services:
  postgres-auth:
    image: postgres:15
    env_file:
      - .env
    container_name: postgres_auth_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=auth_db
    networks:
      - vpc_private

  postgres-contracts:
    image: postgres:15
    env_file:
      - .env
    container_name: postgres_contracts_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=contracts_db
    networks:
      - vpc_private

  postgres-suppliers:
    image: postgres:15
    env_file:
      - .env
    container_name: postgres_suppliers_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=suppliers_db
    networks:
      - vpc_private

  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
      target: development
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - vpc_private
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ./gateway/api-gateway
      dockerfile: Dockerfile
      target: development
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - dmz
      - vpc_private
    environment:
      - EUREKA_URL=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy

  ms-auth:
    build:
      context: ./services
      dockerfile: ms-auth/Dockerfile
      target: development
    container_name: ms-auth
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      postgres-auth:
        condition: service_started
      service-registry:
        condition: service_healthy

  ms-contracts:
    build:
      context: ./services
      dockerfile: ms-contracts/Dockerfile
      target: development
    container_name: ms-contracts
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-contracts:5432/contracts_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      postgres-contracts:
        condition: service_started
      service-registry:
        condition: service_healthy

  ms-suppliers:
    build:
      context: ./services
      dockerfile: ms-suppliers/Dockerfile
      target: development
    container_name: ms-suppliers
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-suppliers:5432/suppliers_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - vpc_private
    depends_on:
      postgres-suppliers:
        condition: service_started
      service-registry:
        condition: service_healthy

  ms-audit:
    build:
      context: ./services/ms-audit
      dockerfile: Dockerfile
      target: development
    container_name: ms-audit
    networks:
      - vpc_private
    environment:
      - ELASTICSEARCH_NODE=http://elasticsearch_db:9200
    depends_on:
      service-registry:
        condition: service_healthy
      elasticsearch_db:
        condition: service_started

  elasticsearch_db:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch_db
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - vpc_private

networks:
  dmz:
  vpc_private:
